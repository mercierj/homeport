adapter:
  provider: aws
  service: secrets-manager
  route: /compat/aws/secretsmanager
  protocol: aws-json
  actions:
    create: secretsmanager:CreateSecret
    put_value: secretsmanager:PutSecretValue
    get: secretsmanager:GetSecretValue
    describe: secretsmanager:DescribeSecret
    list: secretsmanager:ListSecrets
    get_policy: secretsmanager:GetResourcePolicy
    put_policy: secretsmanager:PutResourcePolicy
    delete_policy: secretsmanager:DeleteResourcePolicy
    tag: secretsmanager:TagResource
    untag: secretsmanager:UntagResource
    delete: secretsmanager:DeleteSecret
  errors:
    AccessDeniedException: denied authorization decision
    ResourceNotFoundException: missing secret
    ResourceExistsException: duplicate create
    InvalidParameterException: malformed request
    InvalidRequestException: reused ClientRequestToken with different secret data
    InternalServiceError: authorizer failure
  pagination:
    max_results: MaxResults
    next_token: NextToken
    max_results_range: 1-100
  idempotency:
    create_secret: ClientRequestToken becomes VersionId; identical name and data replay, changed data returns InvalidRequestException, new token on the same name returns ResourceExistsException
    put_secret_value: ClientRequestToken becomes VersionId; identical data replays, different data returns InvalidRequestException
  quota:
    secret_quota: configurable; default unlimited
  unsupported:
    - persistent_vault_backend
    - cutover
    - rollback
