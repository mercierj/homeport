---
provider: aws
service: ECR
checks:
  discover: go test ./test/integration/aws -run ECR
  cost: go test ./internal/domain/coverage ./internal/app/coverage
  provision: go test ./internal/infrastructure/mapper/...
  migrate: go test ./internal/app/datamigration
  api_compat: go test ./test/compat/...
  env_dns: go test ./internal/app/runbook ./internal/app/cutover
  ha: go test ./internal/domain/provider ./internal/infrastructure/generator/...
  backup: go test ./internal/app/backup
  validate: go test ./internal/app/runbook ./internal/app/metrics
  cutover: go test ./internal/app/cutover
  rollback: go test ./internal/app/cutover ./internal/app/backup
evidence:
  target: Harbor
  app_change_mode: replacement_runbook
  api_compatibility_strategy: HomePort generates a replacement runbook that provisions
    Harbor, migrates source configuration/data, validates service health, cuts traffic
    over, and records rollback steps.
